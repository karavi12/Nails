<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Nails</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #b88a6a; --gold: #c9a063; }
        body { font-family: 'Assistant', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .bg-container { background-size: cover; background-position: center; height: 100vh; display: flex; align-items: center; justify-content: center; transition: 0.7s; }
        .bg-client { background-image: url('4.jpg'); }
        .bg-admin { background-image: url('2.jpg'); }
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px); border-radius: 30px; width: 90%; max-width: 450px; height: 85vh; display: flex; flex-direction: column; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .input-style { background: white; border: 1px solid rgba(184, 138, 106, 0.3); padding: 12px; border-radius: 15px; width: 100%; outline: none; margin-bottom: 10px; }
        .btn-gold { background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%); color: white; font-weight: bold; padding: 15px; border-radius: 15px; width: 100%; transition: 0.2s; cursor: pointer; }
        .btn-gold:active { transform: scale(0.98); }
        .btn-whatsapp { background-color: #25d366; color: white; font-weight: bold; padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; text-align: center; }
        .tab-active { color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: 700; }
        .time-chip { padding: 8px; border-radius: 12px; border: 1px solid var(--accent); text-align: center; cursor: pointer; font-size: 0.9rem; background: white; }
        .time-chip.selected { background: var(--accent); color: white; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day { padding: 8px; border-radius: 50%; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .day-available { background-color: #e0f2fe; color: #0369a1; font-weight: bold; }
        .day-selected { background-color: var(--accent) !important; color: white !important; }
        .day-header { font-weight: bold; color: #b88a6a; padding-bottom: 5px; }
    </style>
</head>
<body id="body-bg" class="bg-container bg-client">

    <div class="glass-panel">
        <div class="flex flex-col items-center mb-4">
            <img src="logo.png" alt="לוגו Studio Nails" class="h-16 mb-2 rounded-full shadow-md">
            <div class="flex justify-between items-center w-full">
                <h1 class="text-2xl font-bold text-gray-800 mx-auto">Studio Nails</h1>
                <button onclick="logout()" id="logout-btn" class="hidden text-red-500 text-xs font-bold bg-white/50 px-3 py-1 rounded-full absolute left-6 top-6">התנתקות</button>
            </div>
        </div>

        <div id="login-screen" class="flex-1 flex flex-col justify-center space-y-4">
            <input type="password" id="auth-code" class="input-style text-center text-2xl tracking-widest" placeholder="****" maxlength="4" onkeypress="if(event.key === 'Enter') handleLogin()">
            <button onclick="handleLogin()" class="btn-gold">כניסה למערכת</button>
        </div>

        <div id="admin-screen" class="hidden flex-col h-full overflow-hidden">
            <div class="flex gap-4 mb-4 border-b">
                <button id="tab-a-list" onclick="switchAdminTab('list')" class="flex-1 pb-2 tab-active">יומן</button>
                <button id="tab-a-set" onclick="switchAdminTab('set')" class="flex-1 pb-2 text-gray-400">שעות</button>
            </div>
            
            <div id="admin-content-list" class="overflow-y-auto flex-1 space-y-2">
                </div>
            
            <div id="admin-reminder-area" class="mt-4">
                <button onclick="sendDailySummary()" class="btn-gold text-sm py-3 mb-2">📋 שלחי לעצמי סיכום יומי לוואטסאפ</button>
            </div>

            <div id="admin-content-set" class="hidden flex-1 flex flex-col">
                <select id="admin-day-select" class="input-style" onchange="loadAdminHours()">
                    <option value="0">יום ראשון</option>
                    <option value="1">יום שני</option>
                    <option value="2">יום שלישי</option>
                    <option value="3">יום רביעי</option>
                    <option value="4">יום חמישי</option>
                    <option value="5">יום שישי</option>
                </select>
                <div id="admin-hours-grid" class="grid grid-cols-3 gap-2 overflow-y-auto flex-1 mb-4"></div>
                <button onclick="saveAdminHours()" class="btn-gold">שמור הגדרות</button>
            </div>
        </div>

        <div id="client-screen" class="hidden flex-col h-full overflow-hidden">
            <div class="flex gap-4 mb-4 border-b text-sm">
                <button id="tab-c-book" onclick="switchClientTab('book')" class="flex-1 pb-2 tab-active">קביעת תור</button>
                <button id="tab-c-my" onclick="switchClientTab('my')" class="flex-1 pb-2 text-gray-400">התורים שלי</button>
            </div>

            <div id="client-content-book" class="flex-1 flex flex-col overflow-y-auto">
                <input type="text" id="c-name" class="input-style" placeholder="שם מלא">
                <input type="tel" id="c-phone" class="input-style" placeholder="מספר טלפון">
                
                <div class="bg-white rounded-2xl p-4 mb-4">
                    <div class="text-center font-bold mb-2 text-gray-700" id="calendar-month">מרץ 2026</div>
                    <div class="calendar-grid">
                        <div class="day-header">א</div><div class="day-header">ב</div><div class="day-header">ג</div>
                        <div class="day-header">ד</div><div class="day-header">ה</div><div class="day-header">ו</div><div class="day-header">ש</div>
                    </div>
                    <div id="calendar-days" class="calendar-grid mt-1"></div>
                </div>

                <div id="c-times-grid" class="grid grid-cols-3 gap-2 mb-4"></div>
                <button onclick="bookApt()" class="btn-whatsapp mb-4">שרייני ושלחי בוואטסאפ</button>
            </div>

            <div id="client-content-my" class="hidden flex-1 flex flex-col">
                <input type="text" id="search-name" class="input-style" placeholder="הזיני שם לצפייה בתורים שלך..." oninput="renderMyAppointments()">
                <div id="my-apts-list" class="flex-1 overflow-y-auto space-y-2 mt-2"></div>
            </div>
        </div>
    </div>

    <script>
        let appointments = JSON.parse(localStorage.getItem('studio_apts') || '[]');
        let workHours = JSON.parse(localStorage.getItem('studio_hours_v2') || '{"0":["09:00","10:00"],"1":["11:00"],"2":[],"3":[],"4":[],"5":[]}');
        let selectedDate = null;
        let selectedTime = null;

        function handleLogin() {
            const code = document.getElementById('auth-code').value;
            if (code === '1234' || code === '9999') {
                localStorage.setItem('role', code);
                renderApp();
            } else alert("קוד שגוי");
        }

        function renderApp() {
            const role = localStorage.getItem('role');
            if (!role) return;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            if (role === '9999') {
                document.getElementById('body-bg').className = "bg-container bg-admin";
                document.getElementById('admin-screen').classList.remove('hidden');
                document.getElementById('client-screen').classList.add('hidden');
                loadAdminList();
            } else {
                document.getElementById('body-bg').className = "bg-container bg-client";
                document.getElementById('client-screen').classList.remove('hidden');
                document.getElementById('admin-screen').classList.add('hidden');
                renderCalendar();
            }
        }

        function switchClientTab(t) {
            document.getElementById('client-content-book').classList.toggle('hidden', t!=='book');
            document.getElementById('client-content-my').classList.toggle('hidden', t!=='my');
            document.getElementById('tab-c-book').className = t==='book' ? 'flex-1 pb-2 tab-active' : 'flex-1 pb-2 text-gray-400';
            document.getElementById('tab-c-my').className = t==='my' ? 'flex-1 pb-2 tab-active' : 'flex-1 pb-2 text-gray-400';
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();

            for (let i = 0; i < firstDay; i++) container.innerHTML += '<div></div>';

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayOfWeek = new Date(dateStr).getDay();
                const isAvailable = workHours[dayOfWeek] && workHours[dayOfWeek].length > 0;
                
                const div = document.createElement('div');
                div.className = `calendar-day ${isAvailable ? 'day-available' : 'text-gray-300'}`;
                div.innerText = d;
                if (isAvailable) {
                    div.onclick = () => {
                        document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('day-selected'));
                        div.classList.add('day-selected');
                        selectedDate = dateStr;
                        loadTimesForClient(dayOfWeek);
                    };
                }
                container.appendChild(div);
            }
        }

        function loadTimesForClient(day) {
            const grid = document.getElementById('c-times-grid');
            grid.innerHTML = '';
            const taken = appointments.filter(a => a.date === selectedDate).map(a => a.time);
            workHours[day].forEach(t => {
                if (!taken.includes(t)) {
                    const div = document.createElement('div');
                    div.className = 'time-chip';
                    div.innerText = t;
                    div.onclick = () => {
                        document.querySelectorAll('.time-chip').forEach(el => el.classList.remove('selected'));
                        div.classList.add('selected');
                        selectedTime = t;
                    };
                    grid.appendChild(div);
                }
            });
        }

        function renderMyAppointments() {
            const name = document.getElementById('search-name').value;
            const list = document.getElementById('my-apts-list');
            list.innerHTML = '';
            if (name.length < 2) return;
            const myApts = appointments.filter(a => a.name.includes(name));
            myApts.forEach(a => {
                list.innerHTML += `<div class="bg-white/80 p-3 rounded-xl border-r-4 border-accent shadow-sm">
                    <div class="font-bold">${a.date.split('-').reverse().join('.')} | ${a.time}</div>
                </div>`;
            });
        }

        function bookApt() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            if (!name || !phone || !selectedDate || !selectedTime) return alert("מלאי את כל הפרטים");
            
            const newApt = { id: Date.now(), name, phone, date: selectedDate, time: selectedTime };
            appointments.push(newApt);
            localStorage.setItem('studio_apts', JSON.stringify(appointments));
            
            const msg = `היי! קבעתי תור ל${name} בתאריך ${selectedDate.split('-').reverse().join('.')} בשעה ${selectedTime}`;
            window.open(`https://wa.me/972547929057?text=${encodeURIComponent(msg)}`);
            location.reload();
        }

        // --- לוגיקת אדמין ---
        function loadAdminList() {
            const container = document.getElementById('admin-content-list');
            container.innerHTML = appointments.sort((a,b) => a.date.localeCompare(b.date)).map(a => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div>
                        <div class="font-bold">${a.name}</div>
                        <div class="text-xs text-gray-500">${a.date.split('-').reverse().join('.')} | ${a.time}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editApt(${a.id})" class="text-blue-500 text-sm bg-blue-50 px-2 py-1 rounded-lg">עריכה</button>
                        <button onclick="cancelApt(${a.id}, '${a.phone}', '${a.name}', '${a.date}', '${a.time}')" class="text-red-500 text-sm bg-red-50 px-2 py-1 rounded-lg">ביטול</button>
                    </div>
                </div>
            `).join('');
        }

        // פונקציה חדשה: שליחת סיכום יומי לאדמין
        function sendDailySummary() {
            const today = new Date().toISOString().split('T')[0];
            const todayApts = appointments.filter(a => a.date === today).sort((a,b) => a.time.localeCompare(b.time));
            
            if (todayApts.length === 0) return alert("אין תורים רשומים להיום.");

            let summary = `📋 *סיכום תורים להיום (${today.split('-').reverse().join('.')})*:\n\n`;
            todayApts.forEach(a => {
                summary += `⏰ ${a.time} - ${a.name} (${a.phone})\n`;
            });
            summary += `\nסה"כ תורים: ${todayApts.length}`;

            window.open(`https://wa.me/972547929057?text=${encodeURIComponent(summary)}`);
        }

        function cancelApt(id, phone, name, date, time) {
            if (confirm(`לבטל את התור של ${name}?`)) {
                appointments = appointments.filter(a => a.id !== id);
                localStorage.setItem('studio_apts', JSON.stringify(appointments));
                const msg = `היי ${name}, התור שלך בתאריך ${date.split('-').reverse().join('.')} בשעה ${time} בוטל.`;
                const formattedPhone = phone.replace(/\D/g, '').startsWith('0') ? '972' + phone.replace(/\D/g, '').substring(1) : phone.replace(/\D/g, '');
                window.open(`https://wa.me/${formattedPhone}?text=${encodeURIComponent(msg)}`);
                loadAdminList();
            }
        }

        function editApt(id) {
            const apt = appointments.find(a => a.id === id);
            const newDate = prompt("תאריך חדש (YYYY-MM-DD):", apt.date);
            const newTime = prompt("שעה חדשה (HH:MM):", apt.time);
            if (newDate && newTime) {
                apt.date = newDate; apt.time = newTime;
                localStorage.setItem('studio_apts', JSON.stringify(appointments));
                loadAdminList();
            }
        }

        function loadAdminHours() {
            const day = document.getElementById('admin-day-select').value;
            const grid = document.getElementById('admin-hours-grid');
            grid.innerHTML = '';
            const hours = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];
            hours.forEach(h => {
                const div = document.createElement('div');
                div.className = `time-chip ${workHours[day].includes(h) ? 'selected' : ''}`;
                div.innerText = h;
                div.onclick = () => div.classList.toggle('selected');
                grid.appendChild(div);
            });
        }

        function saveAdminHours() {
            const day = document.getElementById('admin-day-select').value;
            const selected = Array.from(document.querySelectorAll('#admin-hours-grid .selected')).map(el => el.innerText);
            workHours[day] = selected;
            localStorage.setItem('studio_hours_v2', JSON.stringify(workHours));
            alert("נשמר בהצלחה!");
        }

        function switchAdminTab(t) {
            document.getElementById('admin-content-list').classList.toggle('hidden', t!=='list');
            document.getElementById('admin-reminder-area').classList.toggle('hidden', t!=='list');
            document.getElementById('admin-content-set').classList.toggle('hidden', t!=='set');
            document.getElementById('tab-a-list').className = t==='list' ? 'flex-1 pb-2 tab-active' : 'flex-1 pb-2 text-gray-400';
            document.getElementById('tab-a-set').className = t==='set' ? 'flex-1 pb-2 tab-active' : 'flex-1 pb-2 text-gray-400';
            if (t==='set') loadAdminHours();
        }

        function logout() { localStorage.removeItem('role'); location.reload(); }
        window.onload = renderApp;
    </script>
</body>
</html>
